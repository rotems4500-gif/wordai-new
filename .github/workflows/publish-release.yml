name: Publish Word AI Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm ci failed, retrying with npm install"
            npm install --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart('v')
          if ($pkg.version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match package.json version $($pkg.version)"
          }

      - name: Publish Windows installer and update metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish
