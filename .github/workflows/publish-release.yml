name: Publish Word AI Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm ci failed, retrying with npm install"
            npm install --no-audit --no-fund
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart('v')
          if ($pkg.version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match package.json version $($pkg.version)"
          }

      - name: Clean previous release files
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem release -Force | Remove-Item -Recurse -Force
          }

      - name: Build Windows installer and update metadata
        shell: pwsh
        run: |
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npx electron-builder --win --publish never
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $latest = Get-Content release/latest.yml -Raw
          $pkg = Get-Content package.json | ConvertFrom-Json
          if ($latest -notmatch "version:\s+$($pkg.version)") {
            throw "latest.yml version does not match package.json version $($pkg.version)"
          }

      - name: Create GitHub release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}
