<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WordFlow AI</title>
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <!-- הסרת office.js בעקבות פיצול הפרויקט לאפליקציה עצמאית -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Assistant:wght@400;600;700&family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@400;500;700&family=Miriam+Libre:wght@400;700&family=Secular+One&display=swap" media="print" onload="this.media='all'" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
</head>
<body class="bg-gray-50 h-screen w-screen m-0 overflow-hidden">
    <div id="app" class="h-full w-full"></div>
    <script>
      // מסך שגיאה חירום — מוצג כאשר ה-JS הראשי לא נטען
      window.__showCrashOverlay = function(msg) {
        const existing = document.getElementById('__crash-overlay');
        if (existing) return;
        var el = document.createElement('div');
        el.id = '__crash-overlay';
        el.style.cssText = 'position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:Arial,sans-serif;direction:rtl;padding:32px;';
        var h2 = document.createElement('h2');
        h2.style.cssText = 'color:#c0392b;margin-bottom:12px';
        h2.textContent = '⚠️ שגיאת טעינה';
        var p = document.createElement('p');
        p.style.cssText = 'max-width:600px;text-align:center;line-height:1.7;color:#333;white-space:pre-wrap;word-break:break-word;';
        p.textContent = msg || 'הממשק לא נטען. נסה לסגור ולפתוח מחדש את האפליקציה.';
        var btn = document.createElement('button');
        btn.style.cssText = 'margin-top:20px;padding:8px 22px;background:#2B579A;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px';
        btn.textContent = 'רענן';
        btn.onclick = function() { location.reload(); };
        el.appendChild(h2);
        el.appendChild(p);
        el.appendChild(btn);
        document.body.appendChild(el);
      };
      window.onerror = function(msg, src, line, col, err) {
        // התעלם משגיאות CDN חיצוני
        if (src && (src.indexOf('cdnjs.cloudflare.com') !== -1 || src.indexOf('unpkg.com') !== -1)) return;
        var detail = (err && err.stack) ? err.stack : (msg + ' (' + src + ':' + line + ')');
        window.__showCrashOverlay(detail);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && e.reason.stack ? e.reason.stack : (e.reason && e.reason.message ? e.reason.message : String(e.reason || 'שגיאה לא ידועה'));
        console.error('[Crash] unhandledrejection:', e.reason);
        window.__showCrashOverlay(msg);
      });
      // פולבק: אם הממשק לא נטען אחרי 8 שניות — מסך שגיאה
      // בודק גובה ממשי ולא רק firstChild, למקרה שReact עשה mount חלקי ללא תוכן נראה
      window.__mountTimer = setTimeout(function() {
        var appEl = document.getElementById('app');
        if (!appEl) { window.__showCrashOverlay('אלמנט #app לא נמצא בדף.'); return; }
        var rect = appEl.getBoundingClientRect();
        if (rect.height < 50) {
          window.__showCrashOverlay('הממשק לא נטען תוך זמן סביר. גובה=0 (CSS לא נטען או שגיאת React). נסה לפתוח DevTools עם F12 לפרטים.');
        }
      }, 8000);
    </script>
    <script type="module" src="./src/main.jsx"></script>
</body>
</html>
